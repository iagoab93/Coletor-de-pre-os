name: Coleta de precos

on:
  schedule:
    - cron: "0 9 * * 1"        # toda segunda 09:00 UTC (~06:00 BRT). Ajuste como quiser.
  workflow_dispatch: {}         # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write               # pra commitar os dados de volta no repo

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 30         # guardrail: aborta se passar de 30 min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        working-directory: scraper
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Rodar coleta + consolidar
        working-directory: scraper
        run: |
          node scraper.js
          node consolidar.js

      - name: Commitar dados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "coleta $(date +%F)" || echo "sem mudancas"
          git push
