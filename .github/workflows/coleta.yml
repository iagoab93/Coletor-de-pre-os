name: Coleta de precos

# O MODELO PRINCIPAL agora é LOCAL (roda no PC com navegador real, pega todos os sites).
# Este workflow fica como BACKUP na nuvem, mas:
#   - só coleta os sites "faceis" (Pague Menos, Panvel, Carrefour, Lojas Rede, Super So);
#   - Araujo, Drogasil, Mercado Livre e Amazon bloqueiam o IP de datacenter do GitHub.
# Por isso o agendamento automatico fica DESLIGADO (evita commitar dados parciais e
# conflitar com o seu PC). Rode manualmente pelo botao "Run workflow" se quiser.

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 9 * * 1"   # (desligado) toda segunda 09:00 UTC

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        working-directory: scraper
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Rodar coleta + consolidar
        working-directory: scraper
        run: |
          node scraper.js
          node consolidar.js

      - name: Commitar dados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "coleta nuvem $(date +%F)" || echo "sem mudancas"
          git push
